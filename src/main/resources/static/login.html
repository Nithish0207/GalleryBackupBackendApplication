<!DOCTYPE html>
<html>
<head>
    <title>Gallery Backup Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input
            type="email"
            id="email"
            placeholder="Email"
    >

    <input
            type="password"
            id="password"
            placeholder="Password"
    >

    <button onclick="login()">
        Login
    </button>

    <div id="error" class="error"></div>
</div>

<script>

    async function login() {

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {

            const response = await fetch('/api/auth/login', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    email,
                    password
                })
            });

            const result = await response.json();

            if(result.success){

                const token = result.data.token;

                localStorage.setItem(
                    'adminToken',
                    token
                );

                window.location.href = '/dashboard.html';

            } else {

                document.getElementById('error').innerText =
                    result.message;
            }

        } catch(err){

            document.getElementById('error').innerText =
                err.message;
        }
    }

</script>

</body>
</html>
